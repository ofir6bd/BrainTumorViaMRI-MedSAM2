<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BraTS 2024 - Viewer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <h1>BraTS 2024 &mdash; Viewer</h1>
    <p class="sub">Panels &middot; Modalities + Segmentation &middot; BBox per label &middot; 3D scatter</p>
  </header>

  <section class="controls">
    <label class="field">
      <span>Patient</span>
      <select id="patient"></select>
    </label>

    <div class="field">
      <span>View</span>
      <div class="tabs" id="views">
        <button class="tab" data-view="panels" type="button">Panels</button>
        <button class="tab" data-view="modalities" type="button">Modalities + Seg</button>
        <button class="tab" data-view="bbox" type="button">BBox per label</button>
        <button class="tab" data-view="scatter" type="button">3D scatter</button>
      </div>
    </div>

    <div class="field slice-field" id="sliceField">
      <span>Slice</span>
      <button id="best" type="button">Best</button>
      <input type="range" id="z" min="0" max="0" value="0">
      <span id="zlabel" class="zlabel">z = 0</span>
    </div>
  </section>

  <main>
    <p id="status" class="status">Loading&hellip;</p>
    <img id="viewer" alt="" />
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
